<!DOCTYPE html>
<html lang="ar" dir="rtl">

<head>

<meta charset="UTF-8">

<meta name="viewport"
content="width=device-width, initial-scale=1.0">

<title>
إزالة الصوت من الفيديو
</title>

<style>

body{
margin:0 !important;
padding:0 !important;
background:black !important;
}

/* اخفاء عناصر بلوجر */

header,
footer,
.sidebar,
.widget,
#Header1,
#header,
#footer,
.navbar,
#navbar,
.blog-pager,
.section,
.comments,
#comments,
.tabs,
.post-header,
.post-footer,
.post-title,
header[role="banner"]{
display:none !important;
}

main,
.container,
.content,
body{
width:100% !important;
max-width:100% !important;
}

/* تصميم الموقع */

*{
margin:0;
padding:0;
box-sizing:border-box;
font-family:Arial,sans-serif;
}

html,
body{
width:100%;
height:100%;
overflow:hidden;
background:black;
}

.app{
width:100%;
height:100vh;
display:flex;
flex-direction:column;
justify-content:center;
align-items:center;
padding:20px;
gap:20px;
}

video{
width:100%;
max-width:900px;
max-height:70vh;
background:#111;
border-radius:20px;
}

.buttons{
display:flex;
gap:12px;
flex-wrap:wrap;
justify-content:center;
}

button,
.uploadBtn{
padding:16px 24px;
border:none;
border-radius:16px;
background:#2563eb;
color:white;
font-size:16px;
font-weight:bold;
cursor:pointer;
transition:0.3s;
}

button:hover,
.uploadBtn:hover{
background:#1d4ed8;
transform:scale(1.05);
}

.status{
color:white;
font-size:15px;
}

</style>

</head>

<body>

<div class="app">

<video id="videoPlayer"
controls>
</video>

<div class="buttons">

<label for="videoUpload"
class="uploadBtn">

رفع فيديو

</label>

<input
type="file"
id="videoUpload"
accept="video/*"
hidden>

<button onclick="removeAudio()">

إزالة الصوت

</button>

<button onclick="downloadVideo()">

تنزيل الفيديو

</button>

</div>

<div class="status"
id="statusText">

جاهز

</div>

</div>

<script>

const upload =
document.getElementById('videoUpload');

const video =
document.getElementById('videoPlayer');

const statusText =
document.getElementById('statusText');

let currentVideoURL = '';

upload.addEventListener('change', function(e){

const file = e.target.files[0];

if(file){

currentVideoURL =
URL.createObjectURL(file);

video.src = currentVideoURL;

video.load();

statusText.innerText =
'تم رفع الفيديو';

}

});

function removeAudio(){

video.muted = true;

statusText.innerText =
'تم إزالة الصوت';

}

function downloadVideo(){

if(currentVideoURL === ''){

statusText.innerText =
'قم برفع فيديو أولا';

return;

}

const a =
document.createElement('a');

a.href = currentVideoURL;

a.download = 'video.mp4';

document.body.appendChild(a);

a.click();

document.body.removeChild(a);

statusText.innerText =
'تم تنزيل الفيديو';

}

</script>

</body>

</html>
